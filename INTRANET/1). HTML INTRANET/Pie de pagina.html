   .imagen-encabezado {
    text-align: center;
    margin-bottom: 0px;
    }

    .imagen-encabezado img {
    max-width: 300px;
    height: auto;
    }

    body {
        font-family: Arial, sans-serif;
        background: transparent;
        padding: 40px;
    }

    /* CONTENEDOR PRINCIPAL */
    .certificaciones {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        /* Ajusta este gap para separar o pegar más los logos entre sí */
        gap: 10px; 
        flex-wrap: wrap;
    }

    /* CADA BLOQUE */
    .logo-box {
        text-align: center;
        /* REDUCIDO: Estaba en 200px. Al ser más estrecho, los logos se juntan */
        width: 140px; 
    }

    /* CONTENEDOR DE IMAGEN */
    .img-container {
        height: 100px; 
        display: flex;
        align-items: center; 
        justify-content: center; 
        /* REDUCIDO: Espacio entre logo y texto */
        margin-bottom: 5px; 
    }

    .img-container img {
        /* Ajustado para que el logo RUC no fuerce ancho extra */
        max-width: 120px;
        max-height: 100%;
        width: auto;
        height: auto;
        transition: transform 0.3s ease;
    }

    .img-container img:hover {
        transform: scale(1.05);
    }

    .logo-box p {
        margin: 0;
        font-size: 13px;
        color: #444;
        font-weight: 600;
        line-height: 1.2;
    }

        .redes-abajo{
        margin-top: 20px;
        text-align:center;
    }

    .redes-abajo a{
        display:inline-flex;
        justify-content:center;
        align-items:center;
        width:55px;
        height:55px;
        margin:0 15px;
        border-radius:50%;
        color:#fff;
        font-size:22px;
        text-decoration:none;
        transition: transform 0.3s ease;
    }

    .facebook{
        background:#1877F2;
    }

    .linkedin{
        background:#0A66C2;
    }

    .redes-abajo a:hover{
        transform:scale(1.1);
    }   

    

</style>
