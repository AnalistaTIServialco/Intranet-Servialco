<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valores</title>
    <style>
        body {
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            margin: 0;
        }

        /* Contenedor general */
        .contenedor-valores {
            display: flex;
            flex-direction: column;
            gap: 30px; /* Un poco más de espacio para que el zoom no choque */
            max-width: 1200px;
        }

        /* Filas de imágenes */
        .fila {
            display: flex;
            justify-content: center;
            gap: 20px; 
            flex-wrap: wrap;
        }

        .tarjeta-img {
            width: 150px;
            height: auto;
            display: block;
            cursor: pointer;
            
            /* --- EFECTO DE ANIMACIÓN --- */
            transition: transform 0.3s ease, filter 0.3s ease; /* Transición suave de 0.3 segundos */
        }

        /* Efecto al pasar el mouse */
        .tarjeta-img:hover {
            transform: scale(1.15); /* Aumenta el tamaño un 15% */
            filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.1)); /* Opcional: una pequeña sombra para dar profundidad */
            z-index: 10; /* Asegura que la imagen crezca por encima de las demás */
        }

        /* Responsivo: En celulares se apilan */
        @media (max-width: 600px) {
            .tarjeta-img {
                width: 40%; /* Ajustado un poco menos para que el zoom no se salga de la pantalla */
            }
        }
    </style>
</head>
<body>

<div class="contenedor-valores">
    
    <div class="fila">
        <img src="https://raw.githubusercontent.com/AnalistaTIServialco/Intranet-Servialco/refs/heads/main/INTRANET/4.)VALORES/1.%20Lealtad.png" alt="Lealtad" class="tarjeta-img">
        <img src="https://raw.githubusercontent.com/AnalistaTIServialco/Intranet-Servialco/refs/heads/main/INTRANET/4.)VALORES/2.%20Compromiso.png" alt="Compromiso" class="tarjeta-img">
        <img src="https://raw.githubusercontent.com/AnalistaTIServialco/Intranet-Servialco/refs/heads/main/INTRANET/4.)VALORES/3.%20Respeto.png" alt="Respeto" class="tarjeta-img">
        <img src="https://raw.githubusercontent.com/AnalistaTIServialco/Intranet-Servialco/refs/heads/main/INTRANET/4.)VALORES/4.%20Excelencia.png" alt="Excelencia" class="tarjeta-img">
        <img src="https://raw.githubusercontent.com/AnalistaTIServialco/Intranet-Servialco/refs/heads/main/INTRANET/4.)VALORES/5.%20Colaboracion.png" alt="Colaboración" class="tarjeta-img">
        <img src="https://raw.githubusercontent.com/AnalistaTIServialco/Intranet-Servialco/refs/heads/main/INTRANET/4.)VALORES/6.%20Sostenibilidad.png" alt="Sostenibilidad" class="tarjeta-img">
    </div>

    <div class="fila">
        <img src="https://raw.githubusercontent.com/AnalistaTIServialco/Intranet-Servialco/refs/heads/main/INTRANET/4.)VALORES/7.%20Confianza.png" alt="Confianza" class="tarjeta-img">
        <img src="https://raw.githubusercontent.com/AnalistaTIServialco/Intranet-Servialco/refs/heads/main/INTRANET/4.)VALORES/8.%20Servicio.png" alt="Servicio" class="tarjeta-img">
        <img src="https://raw.githubusercontent.com/AnalistaTIServialco/Intranet-Servialco/refs/heads/main/INTRANET/4.)VALORES/9.%20Innovaci%C3%B3n.png" alt="Innovación" class="tarjeta-img">
        <img src="https://raw.githubusercontent.com/AnalistaTIServialco/Intranet-Servialco/refs/heads/main/INTRANET/4.)VALORES/10.%20Responsabilidad.png" alt="Responsabilidad" class="tarjeta-img">
        <img src="https://raw.githubusercontent.com/AnalistaTIServialco/Intranet-Servialco/refs/heads/main/INTRANET/4.)VALORES/11.%20Gratitud.png" alt="Gratitud" class="tarjeta-img">
    </div>

</div>

</body>
</html>
